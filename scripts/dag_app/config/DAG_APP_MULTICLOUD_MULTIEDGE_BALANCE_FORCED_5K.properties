# Multi-cloud (4 regional DCs in XML) + multi-edge (8 sites) variant of DAG_APP_EDGE_BALANCE_FORCED_5K.
# Edge devices: scripts/dag_app/config/edge_ai_devices_balance_forced_8edge_4cloud.xml
#
# Design goals:
# - Same 5K synthetic DAG load and timing stress as BALANCE_FORCED (edge cannot absorb all parallelism).
# - Four independent cloud datacenters (tier=CLOUD in XML); scheduling must use WAN/cloud within the horizon.
# - Cloud compute still ~1/3 the cost rate of edge (plus xml costPerSec) so naive edge-only policies pay in delay/queueing.
# - Reward scaling unchanged from BALANCE_FORCED so RL training stays comparable; tune alpha/b_cost after first runs if needed.

simulation_time=600
warm_up_period=5
vm_load_check_interval=0.1
location_check_interval=0.1
file_log_enabled=true
deep_file_log_enabled=false

min_number_of_mobile_devices=50
max_number_of_mobile_devices=50
mobile_device_counter_size=100

wlan_range=100000
edge_propagation_delay=0.01
wan_propagation_delay=0.1
lan_internal_delay=0.002
wlan_bandwidth=250
wan_bandwidth=200
gsm_bandwidth=0

# Fallback cloud sizing when NO tier=CLOUD entries exist in XML (ignored when XML defines clouds).
number_of_host_on_cloud_datacenter=4
number_of_vm_on_cloud_host=2
core_for_cloud_vm=4
mips_for_cloud_vm=14000
ram_for_cloud_vm=16000
storage_for_cloud_vm=500000

cloud_cost_per_sec=-1.0
cloud_cost_multiplier_vs_edge=0.333333
cloud_cost_per_bw=0.00000000012
cloud_cost_per_mem=0.0
cloud_cost_per_storage=0.0

core_for_mobile_vm=1
mips_for_mobile_vm=1000
ram_for_mobile_vm=1024
storage_for_mobile_vm=10000

orchestrator_policies=REMOTE_RL

rl_service_url=http://127.0.0.1:8009
http_timeout_ms=10000
training_mode=true

alpha_l=1.0
alpha_c=0.7
l_hat=1000.0
c_hat=1.0
b_cost=1200.0
budget_penalty=-1.0

simulation_scenarios=TWO_TIER

# Keep users effectively stationary during a run to avoid mobility handoff failures.
# Units are minutes in this simulator.
attractiveness_L1_mean_waiting_time=1000000
attractiveness_L2_mean_waiting_time=1000000
attractiveness_L3_mean_waiting_time=1000000

dag_interarrival_rate=2.5

dag_input_path=/srv/data1/home/018179980/siva/EdgeCloudSim/src/edu/boun/edgecloudsim/dagsim/synthetic_dags_5k_container.json

rng_seed=42
stop_when_queues_empty=false
